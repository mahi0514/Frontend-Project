<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Multi-Cuisine Restaurant</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🍽</span>
        <div>
          <h1 class="logo-title">Multi-Cuisine</h1>
          <p class="logo-sub">Restaurant</p>
        </div>
      </div>
      <button class="bill-btn" onclick="showBill()">🧾 View Bill</button>
    </div>
  </header>

  <!-- MAIN NAV TABS -->
  <nav class="tab-nav">
    <button class="tab-btn active" onclick="showSection('starters')">🥗 Starters</button>
    <button class="tab-btn" onclick="showSection('maincourse')">🍛 Main Course</button>
    <button class="tab-btn" onclick="showSection('desserts')">🍮 Desserts</button>
  </nav>

  <!-- STARTERS SECTION -->
  <section id="starters" class="menu-section active">
    <div class="section-header">
      <h2>Starter Corner</h2>
      <div class="sub-tabs">
        <button class="sub-tab active" onclick="showSubTab('veg-starters', this)">🌿 Veg Starters</button>
        <button class="sub-tab" onclick="showSubTab('nonveg-starters', this)">🍗 Non-Veg Starters</button>
      </div>
    </div>

    <div id="veg-starters" class="sub-section active">
      <div class="menu-grid" id="veg-starter-grid"></div>
    </div>
    <div id="nonveg-starters" class="sub-section">
      <div class="menu-grid" id="nveg-starter-grid"></div>
    </div>
  </section>

  <!-- MAIN COURSE SECTION -->
  <section id="maincourse" class="menu-section">
    <div class="section-header">
      <h2>Main Course</h2>
      <div class="sub-tabs">
        <button class="sub-tab active" onclick="showSubTab('indian-veg', this)">🥦 Indian Veg</button>
        <button class="sub-tab" onclick="showSubTab('indian-nonveg', this)">🍖 Indian Non-Veg</button>
        <button class="sub-tab" onclick="showSubTab('chinese', this)">🥡 Chinese</button>
      </div>
    </div>
    <div id="indian-veg" class="sub-section active">
      <div class="menu-grid" id="indian-veg-grid"></div>
    </div>
    <div id="indian-nonveg" class="sub-section">
      <div class="menu-grid" id="indian-nonveg-grid"></div>
    </div>
    <div id="chinese" class="sub-section">
      <div class="menu-grid" id="chinese-grid"></div>
    </div>
  </section>

  <!-- DESSERTS SECTION -->
  <section id="desserts" class="menu-section">
    <div class="section-header">
      <h2>Dessert Corner</h2>
    </div>
    <div class="menu-grid" id="desserts-grid"></div>
  </section>

  <!-- CART FLOATING BUTTON -->
  <div class="cart-float" onclick="showBill()" id="cartFloat" style="display:none">
    🛒 <span id="cartCount">0</span> items · ₹<span id="cartTotal">0</span>
  </div>

  <!-- BILL MODAL -->
  <div id="billModal" class="modal-overlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h2>🧾 Your Bill</h2>
        <button class="close-btn" onclick="closeBill()">✕</button>
      </div>
      <div class="modal-body">
        <div id="billItems" class="bill-items"></div>

        <div class="bill-totals">
          <div class="bill-row"><span>Subtotal</span><span id="subtotal">₹0</span></div>
          <div class="bill-row gst"><span>GST (18%)</span><span id="gstAmt">₹0</span></div>
          <div class="bill-row grand"><span>Grand Total</span><span id="grandTotal">₹0</span></div>
        </div>

        <div class="whatsapp-section">
          <h3>📲 Send Bill via WhatsApp</h3>
          <div class="phone-input-row">
            <select id="countryCode">
              <option value="91">🇮🇳 +91</option>
              <option value="1">🇺🇸 +1</option>
              <option value="44">🇬🇧 +44</option>
              <option value="971">🇦🇪 +971</option>
              <option value="65">🇸🇬 +65</option>
              <option value="60">🇲🇾 +60</option>
              <option value="61">🇦🇺 +61</option>
            </select>
            <input type="tel" id="customerPhone" placeholder="Customer mobile number" maxlength="15" />
          </div>
          <input type="text" id="customerName" placeholder="Customer name (optional)" style="width:100%;margin-top:8px;" />
          <button class="whatsapp-btn" onclick="sendWhatsApp()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Send Bill on WhatsApp
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="menu-data.js"></script>
  <script src="app.js"></script>
</body>
</html>
